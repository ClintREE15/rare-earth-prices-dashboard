<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rare Earth Prices - Export vs Domestic Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #ffffff; color: #1e293b; padding: 24px; }
  h1 { text-align: center; font-size: 1.6rem; margin-bottom: 4px; color: #0f172a; }
  .subtitle { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 28px; }
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; color: #64748b; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .tab:hover { border-color: #3b82f6; color: #1e293b; }
  .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; font-weight: 600; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-container { background: #f8fafc; border-radius: 14px; padding: 24px; border: 1px solid #e2e8f0; }
  .chart-container h3 { text-align: center; font-size: 0.9rem; color: #0f172a; margin-bottom: 12px; }
  .chart-wrapper { position: relative; height: 380px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #f8fafc; border-radius: 12px; padding: 18px; border: 1px solid #e2e8f0; overflow: hidden; }
  .card h3 { font-size: 0.95rem; color: #2563eb; margin-bottom: 12px; }
  .card .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; white-space: nowrap; }
  th { text-align: left; padding: 8px 10px; color: #64748b; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
  td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; }
  tr:hover td { background: #e2e8f0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .badge-nc { background: #e2e8f0; color: #64748b; }
  .badge-up { background: #d1fae5; color: #065f46; }
  .badge-down { background: #fee2e2; color: #991b1b; }
  .legend { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; font-size: 0.8rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary-card { background: #f8fafc; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #e2e8f0; }
  .summary-card .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .blue { color: #2563eb; }
  .green { color: #059669; }
  .orange { color: #ea580c; }
  .red { color: #dc2626; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin: 28px 0 14px; color: #0f172a; }
</style>
</head>
<body>

      <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> High</div>
    </div>
    <div class="chart-wrapper"><canvas id="exportChart"></canvas></div>

    </div>

const elements = Object.keys(data);
let activeElement = "Neodymium";
let exportChartObj = null;
let domesticChartObj = null;

// Summary stats
const totalExport = elements.reduce((s, e) => s + data[e].export.length, 0);
const totalDomestic = elements.reduce((s, e) => s + data[e].domestic.length, 0);
const changedItems = [];
elements.forEach(e => {
  [...data[e].export, ...data[e].domestic].forEach(item => {
    if (item.change !== "nc") changedItems.push({ element: e, ...item });
  });
});

function renderSummary() {
  const html = `
    <div class="summary-card"><div class="label">Elements Tracked</div><div class="value blue">${elements.length}</div></div>
    <div class="summary-card"><div class="label">Export Price Points</div><div class="value green">${totalExport}</div></div>
    <div class="summary-card"><div class="label">Domestic Price Points</div><div class="value orange">${totalDomestic}</div></div>
    <div class="summary-card"><div class="label">Prices w/ Weekly Change</div><div class="value red">${changedItems.length}</div></div>
  `;
  document.getElementById("summaryRow").innerHTML = html;
}

function renderTabs() {
  const container = document.getElementById("elementTabs");
  container.innerHTML = elements.map(e =>
    `<div class="tab ${e === activeElement ? 'active' : ''}" onclick="selectElement('${e}')">${e === 'PrNd' ? 'Pr-Nd' : e}</div>`
  ).join("");
}

function selectElement(el) {
  activeElement = el;
  renderTabs();
  renderCharts();
}

function truncLabel(str) {
  return str.length > 38 ? str.substring(0, 38) + '...' : str;
}

function renderCharts() {
  const el = data[activeElement];
  const displayName = activeElement === 'PrNd' ? 'Praseodymium-Neodymium' : activeElement;

  // --- Export chart (USD) ---
  const expLabels = el.export.map(i => truncLabel(i.market));
  const expLow = el.export.map(i => i.low);
  const expHigh = el.export.map(i => i.high);
  const expUnits = el.export.map(i => i.unit);

  if (exportChartObj) exportChartObj.destroy();
  document.getElementById('exportChartTitle').textContent = displayName + ' - Export Prices (USD)';

  exportChartObj = new Chart(document.getElementById("exportChart").getContext("2d"), {
    type: 'bar',
    data: {
      labels: expLabels,
      datasets: [
        { label: 'Low', data: expLow, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4 },
        { label: 'High', data: expHigh, backgroundColor: 'rgba(96,165,250,0.5)', borderRadius: 4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const unit = expUnits[ctx.dataIndex] || '';
              return ctx.dataset.label + ': ' + ctx.parsed.x.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + unit;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => '$' + v.toLocaleString() }, grid: { color: '#e2e8f0' } },
        y: { ticks: { color: '#1e293b', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  // --- Domestic chart (USD, converted from CNY at 6.84) ---
  const domLabels = el.domestic.map(i => truncLabel(i.market));
  const domLow = el.domestic.map(i => i.low);
  const domHigh = el.domestic.map(i => i.high);
  const domUnits = el.domestic.map(i => i.unit);

  if (domesticChartObj) domesticChartObj.destroy();
  document.getElementById('domesticChartTitle').textContent = displayName + ' - China Domestic Prices (USD)';

  domesticChartObj = new Chart(document.getElementById("domesticChart").getContext("2d"), {
    type: 'bar',
    data: {
      labels: domLabels,
      datasets: [
        { label: 'Low', data: domLow, backgroundColor: 'rgba(249,115,22,0.7)', borderRadius: 4 },
        { label: 'High', data: domHigh, backgroundColor: 'rgba(251,146,60,0.5)', borderRadius: 4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const unit = domUnits[ctx.dataIndex] || '';
              return ctx.dataset.label + ': ' + ctx.parsed.x.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + unit;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => '$' + v.toLocaleString() }, grid: { color: '#e2e8f0' } },
        y: { ticks: { color: '#1e293b', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function changeBadge(val) {
  if (val === "nc") return '<span class="badge badge-nc">nc</span>';
  const num = parseFloat(val);
  if (num > 0) return `<span class="badge badge-up">+${val}</span>`;
  return `<span class="badge badge-down">${val}</span>`;
}

function renderTables() {
  const container = document.getElementById("tableGrid");
  container.innerHTML = elements.map(el => {
    const d = data[el];
    const name = el === 'PrNd' ? 'Praseodymium-Neodymium' : el;
    const rows = (items, type) => items.map(i => `
      <tr>
        <td style="color:${type === 'export' ? '#2563eb' : '#ea580c'}">${type === 'export' ? 'EXP' : 'CN'}</td>
        <td>${i.market}</td>
        <td>${i.unit}</td>
        <td style="text-align:right">${i.low.toLocaleString()}</td>
        <td style="text-align:right">${i.high.toLocaleString()}</td>
        <td style="text-align:center">${changeBadge(i.change)}</td>
      </tr>
    `).join("");
    return `
      <div class="card">
        <h3>${name}</h3>
        <div class="table-wrap">
        <table>
          <thead><tr><th></th><th>Market</th><th>Unit</th><th style="text-align:right">Low</th><th style="text-align:right">High</th><th style="text-align:center">+/-</th></tr></thead>
          <tbody>
            ${rows(d.export, 'export')}
            ${rows(d.domestic, 'domestic')}
          </tbody>
        </table>
        </div>
      </div>
    `;
  }).join("");
}

renderSummary();
renderTabs();
renderCharts();
renderTables();
</script>
</body>
</html>
