const elements = Object.keys(data);
let activeElement = "Neodymium";
let exportChartObj = null;
let domesticChartObj = null;

// Summary stats
const totalExport = elements.reduce((s, e) => s + data[e].export.length, 0);
const totalDomestic = elements.reduce((s, e) => s + data[e].domestic.length, 0);
const changedItems = [];
elements.forEach(e => {
  [...data[e].export, ...data[e].domestic].forEach(item => {
    if (item.change !== "nc") changedItems.push({ element: e, ...item });
  });
});

function renderSummary() {
  const html = `
    <div class="summary-card"><div class="label">Elements Tracked</div><div class="value blue">${elements.length}</div></div>
    <div class="summary-card"><div class="label">Export Price Points</div><div class="value green">${totalExport}</div></div>
    <div class="summary-card"><div class="label">Domestic Price Points</div><div class="value orange">${totalDomestic}</div></div>
    <div class="summary-card"><div class="label">Prices w/ Weekly Change</div><div class="value red">${changedItems.length}</div></div>
  `;
  document.getElementById("summaryRow").innerHTML = html;
}

function renderTabs() {
  const container = document.getElementById("elementTabs");
  container.innerHTML = elements.map(e =>
    `<div class="tab ${e === activeElement ? 'active' : ''}" onclick="selectElement('${e}')">${e === 'PrNd' ? 'Pr-Nd' : e}</div>`
  ).join("");
}

function selectElement(el) {
  activeElement = el;
  renderTabs();
  renderCharts();
}

function truncLabel(str) {
  return str.length > 38 ? str.substring(0, 38) + '...' : str;
}

function renderCharts() {
  const el = data[activeElement];
  const displayName = activeElement === 'PrNd' ? 'Praseodymium-Neodymium' : activeElement;

  // --- Export chart (USD) ---
  const expLabels = el.export.map(i => truncLabel(i.market));
  const expLow = el.export.map(i => i.low);
  const expHigh = el.export.map(i => i.high);
  const expUnits = el.export.map(i => i.unit);

  if (exportChartObj) exportChartObj.destroy();
  document.getElementById('exportChartTitle').textContent = displayName + ' â Export Prices (USD)';

  exportChartObj = new Chart(document.getElementById("exportChart").getContext("2d"), {
    type: 'bar',
    data: {
      labels: expLabels,
      datasets: [
        { label: 'Low', data: expLow, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4 },
        { label: 'High', data: expHigh, backgroundColor: 'rgba(96,165,250,0.5)', borderRadius: 4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const unit = expUnits[ctx.dataIndex] || '';
              return ctx.dataset.label + ': ' + ctx.parsed.x.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + unit;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => '$' + v.toLocaleString() }, grid: { color: '#e2e8f0' } },
        y: { ticks: { color: '#1e293b', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  // --- Domestic chart (CNY / Yn) ---
  const domLabels = el.domestic.map(i => truncLabel(i.market));
  const domLow = el.domestic.map(i => i.low);
  const domHigh = el.domestic.map(i => i.high);
  const domUnits = el.domestic.map(i => i.unit);

  if (domesticChartObj) domesticChartObj.destroy();
  document.getElementById('domesticChartTitle').textContent = displayName + ' â China Domestic Prices (CNY)';

  domesticChartObj = new Chart(document.getElementById("domesticChart").getContext("2d"), {
    type: 'bar',
    data: {
      labels: domLabels,
      datasets: [
        { label: 'Low', data: domLow, backgroundColor: 'rgba(249,115,22,0.7)', borderRadius: 4 },
        { label: 'High', data: domHigh, backgroundColor: 'rgba(251,146,60,0.5)', borderRadius: 4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const unit = domUnits[ctx.dataIndex] || '';
              return ctx.dataset.label + ': ' + ctx.parsed.x.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + unit;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => 'Yn ' + v.toLocaleString() }, grid: { color: '#e2e8f0' } },
        y: { ticks: { color: '#1e293b', font: { size: 11 } }, grid: { display: false } }

    }

}

function changeBadge(val) {
  if (val === "nc") return '<span class="badge badge-nc">nc</span>';
  const num = parseFloat(val);
  if (num > 0) return `<span class="badge badge-up">+${val}</span>`;
  return `<span class="badge badge-down">${val}</span>`;
}

function renderTables() {
  const container = document.getElementById("tableGrid");
  container.innerHTML = elements.map(el => {
    const d = data[el];
    const name = el === 'PrNd' ? 'Praseodymium-Neodymium' : el;
    const rows = (items, type) => items.map(i => `
      <tr>
        <td style="color:${type === 'export' ? '#2563eb' : '#ea580c'}">${type === 'export' ? 'ð' : 'ð¨ð³'}</td>
        <td>${i.market}</td>
        <td>${i.unit}</td>
        <td style="text-align:right">${i.low.toLocaleString()}</td>
        <td style="text-align:right">${i.high.toLocaleString()}</td>
        <td style="text-align:center">${changeBadge(i.change)}</td>
      </tr>
    `).join("");
    return `
      <div class="card">
        <h3>${name}</h3>
        <div class="table-wrap">
        <table>
          <thead><tr><th></th><th>Market</th><th>Unit</th><th style="text-align:right">Low</th><th style="text-align:right">High</th><th style="text-align:center">Â±</th></tr></thead>
          <tbody>
            ${rows(d.export, 'export')}
            ${rows(d.domestic, 'domestic')}
          </tbody>
        </table>
        </div>
      </div>
    `;
  }).join("");
}
